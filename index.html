<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#ff9a9e,#fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 400px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      margin: 8px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .yes { background: #28a745; color: white; }
    .no { background: #dc3545; color: white; }

    .hidden { display: none; }

    /* floating hearts */
    .heart {
      position: fixed;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* mobile */
    @media (max-width: 480px) {
      h1 { font-size: 20px; }
      h2 { font-size: 18px; }
      h3 { font-size: 16px; }
    }
  </style>
</head>

<body>

<!-- 🔐 LOCK SCREEN -->
<div class="container" id="lockScreen">
  <div class="card">
    <h2>🔐 Private Message</h2>
    <p>Enter the nickname you gave me 🥺</p>
    <input type="password" id="codeInput" placeholder="Enter nickname">
    <br>
    <button onclick="unlock()">Unlock ❤️</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ❤️ MAIN APP -->
<div class="container hidden" id="mainApp">
  <div class="card">
    <h1>Hey Radhika❤️</h1>

    <h2 id="typing"></h2>

    <h3>Will you forgive me? 🥺</h3>

    <button class="yes" onclick="forgive()">Yes 😊</button>
    <button class="no" id="noBtn" onmouseover="moveBtn()">No 😜</button>

    <p id="response"></p>
  </div>
</div>

<script>

  // 🔐 CHANGE THIS
  const secretCode = "jhaplu";

  // unlock
  function unlock() {
    const input = document.getElementById("codeInput").value;

    if (input.toLowerCase() === secretCode.toLowerCase()) {
      document.getElementById("lockScreen").classList.add("hidden");
      document.getElementById("mainApp").classList.remove("hidden");
      typeEffect();
    } else {
      document.getElementById("error").innerText = "Wrong nickname 😢 Try again...";
    }
  }

  // 💬 PLAYFUL MESSAGE (UPDATED)
  const text = "I messed up… but uninstall mat karna 😅 Update aa raha hai — better version of me ❤️";

  let i = 0;
  function typeEffect() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeEffect, 40);
    }
  }

  // ❤️ forgive
  function forgive() {
    document.getElementById("response").innerHTML =
      "Thank you ❤️ Ab smile bhi kar do na 😄";
  }

  // 😜 move NO button (mobile safe)
  function moveBtn() {
    const btn = document.getElementById("noBtn");

    const maxX = window.innerWidth - 100;
    const maxY = window.innerHeight - 100;

    btn.style.position = "fixed";
    btn.style.left = Math.random() * maxX + "px";
    btn.style.top = Math.random() * maxY + "px";
  }

  // 💖 floating hearts
  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random()*20+10)+"px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }

  setInterval(createHeart, 400);

</script>

</body>
</html>
