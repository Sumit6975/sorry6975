<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#ff9a9e,#fad0c4);
      text-align: center;
      overflow: hidden;
    }

    /* container */
    .container {
      margin-top: 100px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .hidden { display: none; }

    /* buttons */
    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .yes { background: #28a745; color: white; }
    .no { background: #dc3545; color: white; position: absolute; }

    /* floating items */
    .item {
      position: absolute;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

  </style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🔐 LOCK -->
<div class="container" id="lockScreen">
  <div class="card">
    <h2>🔐 Private Message</h2>
    <p>Enter the nickname you gave me 🥺</p>
    <input type="password" id="codeInput">
    <br>
    <button onclick="unlock()">Unlock ❤️</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ❤️ MAIN -->
<div class="container hidden" id="mainApp">
  <div class="card">
    <h1>Hey Radhika ❤️</h1>
    <h2 id="typing"></h2>

    <h3>Will you forgive me? 🥺</h3>

    <button class="yes" onclick="forgive()">Yes 😊</button>
    <button class="no" id="noBtn" onmouseover="moveBtn()">No 😜</button>

    <p id="response"></p>
  </div>
</div>

<script>

  // 🔐 secret nickname
  const secretCode = "jhaplu"; // change this

  // unlock
  function unlock() {
    const input = document.getElementById("codeInput").value;

    if (input.toLowerCase() === secretCode.toLowerCase()) {
      document.getElementById("lockScreen").classList.add("hidden");
      document.getElementById("mainApp").classList.remove("hidden");

      document.getElementById("bgMusic").play().catch(()=>{});
      typeEffect();
    } else {
      document.getElementById("error").innerText = "Wrong nickname 😢";
    }
  }

  // typing effect
  const text = "I know I messed up… but you mean a lot to me ❤️";
  let i = 0;

  function typeEffect() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeEffect, 50);
    }
  }

  // forgive → final screen
  function forgive() {
    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#ff758c;color:white;font-size:28px;text-align:center;flex-direction:column;">
        Thank you ❤️<br>I promise I’ll make everything right 😊
    </div>`;
  }

  // moving NO button
  function moveBtn() {
    const btn = document.getElementById("noBtn");
    btn.style.top = Math.random() * (window.innerHeight - 50) + "px";
    btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  }

  // floating animations (hearts + chocolates + gifts)
  const emojis = ["❤️","🍫","🎁"];

  function createItem() {
    const item = document.createElement("div");
    item.classList.add("item");

    item.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    item.style.left = Math.random() * 100 + "vw";
    item.style.fontSize = (Math.random()*20 + 15) + "px";

    document.body.appendChild(item);

    setTimeout(() => item.remove(), 6000);
  }

  setInterval(createItem, 300);

</script>

</body>
</html>
